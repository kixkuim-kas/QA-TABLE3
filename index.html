<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 1.5vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        
        .header { height: 10vh; display: flex; align-items: center; margin-bottom: 1vh; }
        .header img { height: 7vh; margin-right: 1.5vw; }
        .header h1 { font-size: 2.8vh; color: #002f6c; margin: 0; }
        .company-name { font-size: 1.8vh; color: #002f6c; font-weight: bold; margin-left: auto; text-align: right; }

        /* 全体を囲むコンテナ：背景画像を適用 */
        .main-container { height: 88vh; display: flex; gap: 2vw; background-image: url('PCA3.png'); background-repeat: no-repeat; background-position: center; background-size: contain; }
        
        /* 左側：テーブルセクション（既読性確保のため背景を白に） */
        .left-panel { width: 60%; height: 100%; overflow-y: auto; background-color: rgba(255, 255, 255, 0.85); padding: 1vh; border-radius: 8px; }
        
        /* 右側：円グラフ配置セクション */
        .right-panel { width: 35%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        table { width: 100%; border-collapse: collapse; font-size: 1.5vh; margin-bottom: 2vh; }
        th, td { padding: 0.7vh; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #002f6c; color: white; }
        
        /* 円グラフエリア */
        .chart-container { width: 70%; aspect-ratio: 1 / 1; position: relative; background-color: rgba(255, 255, 255, 0.85); border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.1); margin-top: 5vh; }
        .chart-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .text-line1 { font-size: 1.8vh; color: #d32f2f; font-weight: bold; }
        .text-line2 { font-size: 5vh; color: #002f6c; font-weight: bold; line-height: 1; }
        .text-line3 { font-size: 2vh; color: #00bfff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="bg-logo.png" alt="Logo">
        <h1>KAS Accident/Incident Information</h1>
        <div class="company-name">KANSAI AIRPORTS<br>Aviation Services</div>
    </div>

    <div id="loading" style="font-size: 3vh; padding: 10vh;">読み込み中...</div>

    <div class="main-container" id="main-container" style="display: none;">
        <div class="left-panel" id="table-section"></div>
        <div class="right-panel">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内 無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">0</span>日</div>
                    <div class="text-line3"><span id="current-days-display">0</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?gid=2118289952&single=true&output=csv';
        
        async function loadData() {
            try {
                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const text = await response.text();
                const data = text.split(/\r?\n/).map(line => line.split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1')));
                
                const tableSection = document.getElementById('table-section');
                tableSection.innerHTML = '';
                
                const createTable = (h, r) => {
                    const t = document.createElement('table');
                    t.innerHTML = `<thead><tr>${h.map(i=>`<th>${i}</th>`).join('')}</tr></thead><tbody>${r.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>`;
                    tableSection.appendChild(t);
                };
                
                if(data[1]) createTable(data[1].slice(0,3), [data[2].slice(0,3)]);
                if(data[4]) createTable(data[4].slice(0,4), [data[5].slice(0,4)]);
                
                // KPI表を左側に表示
                if(data[7]) {
                    const kpiRows = data.slice(8).filter(r => 
                        r[0] && r[0] !== "制限区域内無事故日数目標" && r[0] !== "継続日数"
                    ).map(r => r.slice(0,3));
                    createTable(data[7].slice(0,3), kpiRows);
                }

                const findVal = (idx1, idx2) => parseInt(data[idx1][idx2]);
                const goal = findVal(15, 1);
                const cur = findVal(16, 1);
                
                document.getElementById('goal-days-display').textContent = isNaN(goal) ? 0 : goal;
                document.getElementById('current-days-display').textContent = isNaN(cur) ? 0 : cur;

                const ctx = document.getElementById('doughnutChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: [cur, Math.max(0, goal-cur)], backgroundColor: ['#00bfff', '#eee'] }] },
                    options: { cutout: '80%', plugins: { legend: { display: false } } }
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
            } catch(e) { document.getElementById('loading').textContent = 'エラー'; }
        }
        loadData();
    </script>
</body>
</html>
